    <title>AlterEgo</title>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="overlay-text">Alter<hgl>Ego</hgl></div>
    <div class="overlay-text-quote">"Не витрачай час на себе" - АмНям</div>

    <script>
        window.onload = function() {
            initLiquidMarble();
        };

        function initLiquidMarble() {
            const container = document.getElementById('canvas-container');

            const scene = new THREE.Scene();
            const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

            const renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            const vertexShader = `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                uniform float u_time;
                uniform vec2 u_resolution;

                varying vec2 vUv;
                
                // Функція псевдовипадкових чисел
                vec3 permute(vec3 x) { return mod(((x*34.0)+1.0)*x, 289.0); }
                
                // Simplex Noise 2D (швидкий та органічний шум)
                float snoise(vec2 v){
                    const vec4 C = vec4(0.211324865405187, 0.366025403784439,
                             -0.577350269189626, 0.024390243902439);
                    vec2 i  = floor(v + dot(v, C.yy) );
                    vec2 x0 = v -   i + dot(i, C.xx);
                    vec2 i1;
                    i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
                    vec4 x12 = x0.xyxy + C.xxzz;
                    x12.xy -= i1;
                    i = mod(i, 289.0);
                    vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 ))
                    + i.x + vec3(0.0, i1.x, 1.0 ));
                    vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy),
                      dot(x12.zw,x12.zw)), 0.0);
                    m = m*m ;
                    m = m*m ;
                    vec3 x = 2.0 * fract(p * C.www) - 1.0;
                    vec3 h = abs(x) - 0.5;
                    vec3 ox = floor(x + 0.5);
                    vec3 a0 = x - ox;
                    m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
                    vec3 g;
                    g.x  = a0.x  * x0.x  + h.x  * x0.y;
                    g.yz = a0.yz * x12.xz + h.yz * x12.yw;
                    return 130.0 * dot(m, g);
                }

                // Fractal Brownian Motion (fBm) для створення складності
                float fbm(vec2 x) {
                    float v = 0.0;
                    float a = 0.5;
                    vec2 shift = vec2(100.0);
                    // Матриця обертання для зменшення артефактів сітки
                    mat2 rot = mat2(cos(0.5), sin(0.5), -sin(0.5), cos(0.5));
                    for (int i = 0; i < 6; ++i) {
                        v += a * snoise(x);
                        x = rot * x * 2.0 + shift;
                        a *= 0.5;
                    }
                    return v;
                }

                void main() {
                    // Нормалізація координат екрану
                    vec2 st = gl_FragCoord.xy / u_resolution.xy;
                    // Коригування пропорцій, щоб візерунок не розтягувався
                    st.x *= u_resolution.x / u_resolution.y;

                    // Масштаб візерунку
                    st *= 4.0;

                    // Domain Warping (викривлення простору) - техніка для створення "текучості"
                    vec2 q = vec2(0.);
                    q.x = fbm( st + 0.05 * u_time);
                    q.y = fbm( st + vec2(1.0));

                    vec2 r = vec2(0.);
                    r.x = fbm( st + 1.0 * q + vec2(1.7, 9.2) + 0.15 * u_time );
                    r.y = fbm( st + 1.0 * q + vec2(8.3, 2.8) + 0.126 * u_time);

                    // Фінальне значення шуму з викривленням
                    float f = fbm(st + r);

                    // Кольорова палітра на основі твоєї картинки
                    vec3 colorBlack = vec3(0.01, 0.0, 0.0);       // Глибокий чорний
                    vec3 colorDarkRed = vec3(0.25, 0.02, 0.02);   // Темно-червоний (кров'яний)
                    vec3 colorRed = vec3(0.45, 0.05, 0.05);       // Яскравіший червоний для акцентів

                    // Змішування кольорів на основі шуму
                    // Створюємо базовий перехід від чорного до темно-червоного
                    vec3 color = mix(colorBlack, colorDarkRed, smoothstep(0.1, 0.7, f));
                    
                    // Додаємо гострі лінії "мармуру" використовуючи абсолютне значення шуму
                    float ridge = abs(snoise(st * 2.0 + r));
                    ridge = 1.0 - ridge;
                    ridge = pow(ridge, 4.0); // Робимо лінії тоншими та гострішими
                    
                    // Додаємо світліші червоні прожилки
                    color = mix(color, colorRed, ridge * 0.6);
                    
                    // Ще один шар темних прожилок для глибини
                    float darkRidge = abs(snoise(st * 3.0 - r));
                    color = mix(color, vec3(0.0), darkRidge * 0.4);

                    gl_FragColor = vec4(color, 1.0);
                }
            `;

            const uniforms = {
                u_time: { value: 0.0 },
                u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
            };

            const material = new THREE.ShaderMaterial({
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                uniforms: uniforms
            });

            const geometry = new THREE.PlaneGeometry(2, 2);
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            const clock = new THREE.Clock();

            function animate() {
                requestAnimationFrame(animate);
                
                uniforms.u_time.value = clock.getElapsedTime() * 0.5;

                renderer.render(scene, camera);
            }

            animate();

            window.addEventListener('resize', onWindowResize, false);

            function onWindowResize() {
                renderer.setSize(window.innerWidth, window.innerHeight);
                uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
            }
        }
    </script>
