<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Unicase:wght@300;400;500;600;700&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <title>AlterEgo</title>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="logo-header">
        <h1>Alter<span>Ego</span></h1>
    </div>

    <div class="container pb-5">
        <div class="glass-panel p-5">
            <div class="row align-items-center g-4">
                
                <div class="col-auto text-center avatar-section">
                    <div id="avatar-trigger">
                        <img src="img/ClassicOmNOM.png" id="main-img" class="rounded-circle" alt="AI Persona">
                    </div>
                    
                    <div id="avatar-menu" class="glass-dropdown d-none">
                        <div class="avatar-option" data-img="img/ClassicOmNOM.png"><img src="img/ClassicOmNOM.png"></div>
                        <div class="avatar-option" data-img="img/GirlOmNom.jpg"><img src="img/GirlOmNom.jpg"></div>
                        <div class="avatar-option" data-img="img/KidOmNom.JPG"><img src="img/KidOmNom.JPG"></div>
                        <div class="avatar-option" data-img="img/CoolOmNom.JPG"><img src="img/CoolOmNom.JPG"></div>
                         <div class="avatar-option" data-img="img/SmartOmNom.JPG"><img src="img/SmartOmNom.JPG"></div>
                    </div>
                </div>

                <div class="col">
                    <div class="mb-3">
                        <textarea class="form-control glass-input" id="aiTextArea" rows="5" placeholder="Як Ви бачите свого двіника?"></textarea>
                    </div>
                    <div class="text-end">
                        <button class="btn btn-danger" id="sendBtn">Надіслати</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        function initLiquidMarble() {
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            const renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            const vertexShader = `
                varying vec2 vUv;
                void main() { vUv = uv; gl_Position = vec4(position, 1.0); }
            `;

            const fragmentShader = `
                uniform float u_time;
                uniform vec2 u_resolution;
                varying vec2 vUv;
                vec3 permute(vec3 x) { return mod(((x*34.0)+1.0)*x, 289.0); }
                float snoise(vec2 v){
                    const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
                    vec2 i = floor(v + dot(v, C.yy) );
                    vec2 x0 = v - i + dot(i, C.xx);
                    vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
                    vec4 x12 = x0.xyxy + C.xxzz;
                    x12.xy -= i1;
                    i = mod(i, 289.0);
                    vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0 )) + i.x + vec3(0.0, i1.x, 1.0 ));
                    vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
                    m = m*m; m = m*m;
                    vec3 x = 2.0 * fract(p * C.www) - 1.0;
                    vec3 h = abs(x) - 0.5;
                    vec3 ox = floor(x + 0.5);
                    vec3 a0 = x - ox;
                    m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
                    vec3 g; g.x = a0.x * x0.x + h.x * x0.y; g.yz = a0.yz * x12.xz + h.yz * x12.yw;
                    return 130.0 * dot(m, g);
                }
                float fbm(vec2 x) {
                    float v = 0.0; float a = 0.5; vec2 shift = vec2(100.0);
                    mat2 rot = mat2(cos(0.5), sin(0.5), -sin(0.5), cos(0.5));
                    for (int i = 0; i < 6; ++i) { v += a * snoise(x); x = rot * x * 2.0 + shift; a *= 0.5; }
                    return v;
                }
                void main() {
                    vec2 st = gl_FragCoord.xy / u_resolution.xy;
                    st.x *= u_resolution.x / u_resolution.y;
                    st *= 3.0;
                    vec2 q = vec2(fbm(st + 0.05 * u_time), fbm(st + vec2(1.0)));
                    vec2 r = vec2(fbm(st + q + vec2(1.7, 9.2) + 0.15 * u_time), fbm(st + q + vec2(8.3, 2.8) + 0.126 * u_time));
                    float f = fbm(st + r);
                    vec3 color = mix(vec3(0.01, 0.0, 0.0), vec3(0.25, 0.02, 0.02), smoothstep(0.1, 0.7, f));
                    float ridge = pow(1.0 - abs(snoise(st * 2.0 + r)), 4.0);
                    color = mix(color, vec3(0.5, 0.05, 0.05), ridge * 0.6);
                    gl_FragColor = vec4(color, 1.0);
                }
            `;

            const uniforms = {
                u_time: { value: 0.0 },
                u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
            };

            const material = new THREE.ShaderMaterial({ vertexShader, fragmentShader, uniforms });
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
            scene.add(mesh);

            const clock = new THREE.Clock();
            function animate() {
                requestAnimationFrame(animate);
                uniforms.u_time.value = clock.getElapsedTime() * 0.4;
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
                uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
            });
        }

        window.onload = function() {
            initLiquidMarble();

            const trigger = document.getElementById('avatar-trigger');
            const menu = document.getElementById('avatar-menu');
            const mainImg = document.getElementById('main-img');
            const options = document.querySelectorAll('.avatar-option');

            trigger.addEventListener('click', (e) => {
                e.stopPropagation();
                menu.classList.toggle('d-none');
            });

            options.forEach(opt => {
                opt.addEventListener('click', function() {
                    const newImg = this.getAttribute('data-img');
                    mainImg.src = newImg;
                    menu.classList.add('d-none');
                });
            });


            document.addEventListener('click', () => {
                menu.classList.add('d-none');
            });
        };
    </script>
</body>
</html>
